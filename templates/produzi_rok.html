<!DOCTYPE html>
<html>
<head>
    <title>Produži rok posudbe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">Produži rok posudbe</h4>
        </div>
        <div class="card-body">

            <p><strong>Trenutni rok vraćanja:</strong> {{ posudba.rok_vracanja }}</p>

            <form method="post" class="row g-3">
                <div class="col-md-6">
                    <label for="novi_rok" class="form-label">Novi rok vraćanja</label>
                    <input type="date" class="form-control" id="novi_rok" name="novi_rok" required>
                </div>
                <div class="col-md-6 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Produži rok</button>
                </div>
            </form>

            <div class="mt-3">
                <a href="/povrat_clan" class="btn btn-secondary">Natrag na popis posudbi</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
